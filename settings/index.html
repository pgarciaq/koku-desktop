<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Cost Management Desktop</title>
  <style>
    @font-face {
      font-family: "Red Hat Display";
      src: url("../fonts/RedHatDisplayVF.woff2") format("woff2");
      font-weight: 300 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Red Hat Text";
      src: url("../fonts/RedHatTextVF.woff2") format("woff2");
      font-weight: 300 800;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Red Hat Mono";
      src: url("../fonts/RedHatMonoVF.woff2") format("woff2");
      font-weight: 300 700;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; }

    :root, [data-theme="light"] {
      --color-red: #EE0000;
      --color-red-hover: #cc0000;
      --color-bg: #F0F0F0;
      --color-surface: #ffffff;
      --color-surface-elevated: #ffffff;
      --color-text: #151515;
      --color-text-secondary: #6A6E73;
      --color-border: #c6c7c8;
      --color-border-subtle: #d2d2d2;
      --color-input-bg: #ffffff;
      --color-success: #3e8635;
      --color-success-bg: #f3faf2;
      --color-error: #c9190b;
      --color-error-bg: #fef2f0;
      --color-focus: #0066cc;
      --shadow-sm: 0 1px 2px rgba(21, 21, 21, 0.08);
      --shadow-md: 0 4px 12px rgba(21, 21, 21, 0.1);
      --radius: 8px;
    }

    [data-theme="dark"] {
      --color-bg: #151515;
      --color-surface: #1F1F1F;
      --color-surface-elevated: #292929;
      --color-text: #F0F0F0;
      --color-text-secondary: #9a9ca0;
      --color-border: #3c3f42;
      --color-border-subtle: #393939;
      --color-input-bg: #292929;
      --color-success: #5ba352;
      --color-success-bg: #1a2e18;
      --color-error: #fe5142;
      --color-error-bg: #3d1511;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Red Hat Text", system-ui, sans-serif;
      font-size: 0.875rem;
      line-height: 1.5;
      color: var(--color-text);
      background: var(--color-bg);
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .header__icon {
      flex-shrink: 0;
      width: 2.5rem;
      height: 2.5rem;
    }

    .header__title {
      margin: 0;
      font-family: "Red Hat Display", system-ui, sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .section-title {
      margin: 0 0 1rem;
      font-family: "Red Hat Display", system-ui, sans-serif;
      font-size: 1.125rem;
      font-weight: 600;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field:last-child { margin-bottom: 0; }

    .field-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .field-row .field { flex: 1; margin-bottom: 0; }

    label, .label {
      display: block;
      margin-bottom: 0.375rem;
      font-weight: 500;
      color: var(--color-text);
    }

    .hint {
      margin-top: 0.25rem;
      font-size: 0.8125rem;
      color: var(--color-text-secondary);
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select,
    textarea {
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-family: "Red Hat Text", system-ui, sans-serif;
      font-size: 0.875rem;
      color: var(--color-text);
      background: var(--color-input-bg);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--color-focus);
      box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.25);
    }

    textarea {
      font-family: "Red Hat Mono", monospace;
      font-size: 0.8125rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 10rem;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .radio-option input[type="radio"] {
      width: 1rem;
      height: 1rem;
      margin: 0;
      accent-color: var(--color-red);
      cursor: pointer;
    }

    .radio-option--disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .radio-option--disabled input { cursor: not-allowed; }

    .badge-soon {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--color-text-secondary);
    }

    .checkbox-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.625rem;
      cursor: pointer;
    }

    .checkbox-option:last-child { margin-bottom: 0; }

    .checkbox-option input[type="checkbox"] {
      width: 1rem;
      height: 1rem;
      margin: 0;
      accent-color: var(--color-red);
      cursor: pointer;
    }

    .auth-panel { margin-top: 1rem; }

    .auth-panel[hidden] { display: none; }

    .input-with-icon {
      position: relative;
    }

    .input-with-icon input { padding-right: 2.25rem; }

    .input-icon {
      position: absolute;
      right: 0.625rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1rem;
      height: 1rem;
      color: var(--color-text-secondary);
      pointer-events: none;
    }

    details.advanced {
      margin-top: 1rem;
      border: 1px solid var(--color-border-subtle);
      border-radius: 4px;
      overflow: hidden;
    }

    details.advanced summary {
      padding: 0.625rem 0.75rem;
      font-weight: 500;
      cursor: pointer;
      background: var(--color-surface-elevated);
      list-style: none;
    }

    details.advanced summary::-webkit-details-marker { display: none; }

    details.advanced summary::before {
      content: "▸";
      display: inline-block;
      margin-right: 0.5rem;
      transition: transform 0.15s;
    }

    details.advanced[open] summary::before { transform: rotate(90deg); }

    details.advanced .advanced-body { padding: 0.75rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      font-family: "Red Hat Text", system-ui, sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.4;
      border-radius: 4px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--color-red);
      color: #ffffff;
      border-color: var(--color-red);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--color-red-hover);
      border-color: var(--color-red-hover);
    }

    .btn-secondary {
      background: transparent;
      color: var(--color-text);
      border-color: var(--color-border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--color-surface-elevated);
    }

    .btn-outline {
      background: transparent;
      color: var(--color-text);
      border-color: var(--color-border);
    }

    .btn-outline:hover:not(:disabled) {
      border-color: var(--color-text-secondary);
    }

    .test-result {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
      padding: 0.625rem 0.75rem;
      border-radius: 4px;
      font-size: 0.8125rem;
    }

    .test-result[hidden] { display: none; }

    .test-result--success {
      background: var(--color-success-bg);
      color: var(--color-success);
    }

    .test-result--error {
      background: var(--color-error-bg);
      color: var(--color-error);
    }

    .test-result__icon {
      flex-shrink: 0;
      width: 1rem;
      height: 1rem;
    }

    .spinner {
      width: 1rem;
      height: 1rem;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding-top: 0.5rem;
    }

    .footer .btn-primary { flex: 1; }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <svg class="header__icon" viewBox="0 0 32 32" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EE0000" d="M16 4C9.4 4 4 8.6 4 14.5c0 3.2 1.5 6 3.9 7.9L6 28h20l-1.9-5.6C26.5 20.5 28 17.7 28 14.5 28 8.6 22.6 4 16 4z"/>
        <ellipse fill="#151515" cx="16" cy="14" rx="10" ry="3.5"/>
        <path fill="#EE0000" d="M6 28c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-1H6v1z"/>
      </svg>
      <h1 class="header__title">Cost Management Desktop</h1>
    </header>

    <form id="settings-form" novalidate>
      <section class="card" aria-labelledby="connection-heading">
        <h2 class="section-title" id="connection-heading">Connection</h2>
        <div class="field-row">
          <div class="field">
            <label for="server-url">Server URL</label>
            <input type="text" id="server-url" name="server_url" placeholder="http://192.168.1.50:8000" autocomplete="url" spellcheck="false">
          </div>
          <button type="button" class="btn btn-outline" id="test-connection-btn">Test Connection</button>
        </div>
        <div id="test-result" class="test-result" hidden role="status" aria-live="polite"></div>
      </section>

      <section class="card" aria-labelledby="auth-heading">
        <h2 class="section-title" id="auth-heading">Authentication</h2>
        <fieldset class="radio-group" role="radiogroup" aria-label="Authentication mode">
          <label class="radio-option">
            <input type="radio" name="auth_mode" value="dev" id="auth-dev" checked>
            <span>Development (no Keycloak)</span>
          </label>
          <label class="radio-option radio-option--disabled">
            <input type="radio" name="auth_mode" value="oidc" id="auth-oidc" disabled>
            <span>Keycloak OIDC</span>
            <span class="badge-soon">(coming soon)</span>
          </label>
        </fieldset>

        <div class="auth-panel" id="dev-panel">
          <div class="field">
            <label for="dev-username">Username</label>
            <input type="text" id="dev-username" autocomplete="username" value="admin">
          </div>
          <div class="field">
            <label for="dev-email">Email</label>
            <input type="email" id="dev-email" autocomplete="email" value="admin@example.com">
          </div>
          <div class="field">
            <label for="dev-org-id">Org ID</label>
            <input type="text" id="dev-org-id" value="1234567" spellcheck="false">
          </div>
          <div class="field">
            <label for="dev-account">Account Number</label>
            <input type="text" id="dev-account" value="10001" spellcheck="false">
          </div>
          <details class="advanced">
            <summary>Advanced: Raw Identity JSON</summary>
            <div class="advanced-body">
              <label for="dev-identity-json" class="visually-hidden">Development identity JSON</label>
              <textarea id="dev-identity-json" spellcheck="false"></textarea>
            </div>
          </details>
        </div>

        <div class="auth-panel" id="oidc-panel" hidden>
          <div class="field">
            <label for="oidc-client-id">Client ID</label>
            <input type="text" id="oidc-client-id" value="cost-management-desktop" spellcheck="false">
          </div>
          <div class="field">
            <label for="oidc-client-secret">Client Secret</label>
            <div class="input-with-icon">
              <input type="password" id="oidc-client-secret" autocomplete="off">
              <svg class="input-icon" viewBox="0 0 16 16" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                <path fill="currentColor" d="M8 1a4 4 0 0 0-4 4v2H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-1V5a4 4 0 0 0-4-4zm2 6H6V5a2 2 0 1 1 4 0v2z"/>
              </svg>
            </div>
            <p class="hint">Stored securely in the OS keychain</p>
          </div>
        </div>
      </section>

      <section class="card" aria-labelledby="modules-heading">
        <h2 class="section-title" id="modules-heading">Modules</h2>
        <label class="checkbox-option">
          <input type="checkbox" id="module-ros" checked>
          <span>Resource Optimization Service (ROS)</span>
        </label>
        <label class="checkbox-option">
          <input type="checkbox" id="module-sources" checked>
          <span>Sources</span>
        </label>
      </section>

      <section class="card" aria-labelledby="appearance-heading">
        <h2 class="section-title" id="appearance-heading">Appearance</h2>
        <div class="field">
          <label for="theme-select">Theme</label>
          <select id="theme-select" name="theme">
            <option value="system" selected>System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
      </section>

      <footer class="footer">
        <button type="submit" class="btn btn-primary" id="save-btn">Save &amp; Connect</button>
        <button type="button" class="btn btn-secondary" id="cancel-btn" hidden>Cancel</button>
      </footer>
    </form>
  </div>

  <script>
    (function () {
      const invoke = (cmd, args) => window.__TAURI__.core.invoke(cmd, args);

      const DEFAULT_IDENTITY = {
        identity: {
          account_number: "10001",
          org_id: "1234567",
          type: "User",
          user: {
            username: "admin",
            email: "admin@example.com",
            is_org_admin: true
          }
        },
        entitlements: {
          cost_management: { is_entitled: true }
        }
      };

      const els = {
        form: document.getElementById("settings-form"),
        serverUrl: document.getElementById("server-url"),
        testBtn: document.getElementById("test-connection-btn"),
        testResult: document.getElementById("test-result"),
        authDev: document.getElementById("auth-dev"),
        authOidc: document.getElementById("auth-oidc"),
        devPanel: document.getElementById("dev-panel"),
        oidcPanel: document.getElementById("oidc-panel"),
        devUsername: document.getElementById("dev-username"),
        devEmail: document.getElementById("dev-email"),
        devOrgId: document.getElementById("dev-org-id"),
        devAccount: document.getElementById("dev-account"),
        devIdentityJson: document.getElementById("dev-identity-json"),
        oidcClientId: document.getElementById("oidc-client-id"),
        oidcClientSecret: document.getElementById("oidc-client-secret"),
        moduleRos: document.getElementById("module-ros"),
        moduleSources: document.getElementById("module-sources"),
        themeSelect: document.getElementById("theme-select"),
        saveBtn: document.getElementById("save-btn"),
        cancelBtn: document.getElementById("cancel-btn")
      };

      let hasExistingConfig = false;
      let identityFromJson = false;

      function resolveTheme(theme) {
        if (theme === "system") {
          return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        return theme;
      }

      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", resolveTheme(theme));
      }

      function buildIdentityFromFields() {
        return {
          identity: {
            account_number: els.devAccount.value.trim(),
            org_id: els.devOrgId.value.trim(),
            type: "User",
            user: {
              username: els.devUsername.value.trim(),
              email: els.devEmail.value.trim(),
              is_org_admin: true
            }
          },
          entitlements: {
            cost_management: { is_entitled: true }
          }
        };
      }

      function syncJsonFromFields() {
        if (!identityFromJson) {
          els.devIdentityJson.value = JSON.stringify(buildIdentityFromFields(), null, 2);
        }
      }

      function parseIdentityJson() {
        try {
          return JSON.parse(els.devIdentityJson.value);
        } catch {
          return buildIdentityFromFields();
        }
      }

      function applyIdentityToFields(identity) {
        const id = identity?.identity || {};
        const user = id.user || {};
        els.devUsername.value = user.username || "admin";
        els.devEmail.value = user.email || "admin@example.com";
        els.devOrgId.value = id.org_id || "1234567";
        els.devAccount.value = id.account_number || "10001";
        els.devIdentityJson.value = JSON.stringify(identity, null, 2);
        identityFromJson = false;
      }

      function buildConfig() {
        const authMode = els.authDev.checked ? "dev" : "oidc";
        const config = {
          server_url: els.serverUrl.value.trim(),
          auth_mode: authMode,
          theme: els.themeSelect.value,
          modules: {
            ros: els.moduleRos.checked,
            sources: els.moduleSources.checked
          },
          oidc: {
            client_id: els.oidcClientId.value.trim()
          },
          dev_identity: authMode === "dev" ? parseIdentityJson() : DEFAULT_IDENTITY
        };
        return config;
      }

      function populateForm(config) {
        els.serverUrl.value = config.server_url || "http://localhost:8000";
        if (config.auth_mode === "oidc") {
          els.authOidc.checked = true;
        } else {
          els.authDev.checked = true;
        }
        els.oidcClientId.value = config.oidc?.client_id || "cost-management-desktop";
        applyIdentityToFields(config.dev_identity || DEFAULT_IDENTITY);
        els.moduleRos.checked = config.modules?.ros !== false;
        els.moduleSources.checked = config.modules?.sources !== false;
        els.themeSelect.value = config.theme || "system";
        applyTheme(els.themeSelect.value);
        updateAuthPanels();
      }

      function updateAuthPanels() {
        const isDev = els.authDev.checked;
        els.devPanel.hidden = !isDev;
        els.oidcPanel.hidden = isDev;
      }

      function showTestResult(type, html) {
        els.testResult.hidden = false;
        els.testResult.className = "test-result test-result--" + type;
        els.testResult.innerHTML = html;
      }

      function hideTestResult() {
        els.testResult.hidden = true;
        els.testResult.innerHTML = "";
      }

      const checkIcon = '<svg class="test-result__icon" viewBox="0 0 16 16" aria-hidden="true"><path fill="currentColor" d="M6.5 11.5 3 8l1-1 2.5 2.5L12 4l1 1-6.5 6.5z"/></svg>';
      const errorIcon = '<svg class="test-result__icon" viewBox="0 0 16 16" aria-hidden="true"><path fill="currentColor" d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm3.5 9.5-1 1L8 9l-2.5 2.5-1-1L7 8 4.5 5.5l1-1L8 7l2.5-2.5 1 1L9 8l2.5 2.5z"/></svg>';

      async function testConnection() {
        const serverUrl = els.serverUrl.value.trim();
        if (!serverUrl) {
          showTestResult("error", errorIcon + "<span>Enter a server URL first.</span>");
          return;
        }

        hideTestResult();
        els.testBtn.disabled = true;
        const originalLabel = els.testBtn.textContent;
        els.testBtn.innerHTML = '<span class="spinner" aria-hidden="true"></span><span>Testing…</span>';

        try {
          const result = await invoke("test_connection", { serverUrl });
          const version = result?.version || result?.data?.version || result?.cost_management_version || "unknown";
          showTestResult("success", checkIcon + "<span>Connected — server version " + escapeHtml(String(version)) + "</span>");
        } catch (err) {
          const message = err?.message || err?.toString?.() || "Connection failed";
          showTestResult("error", errorIcon + "<span>" + escapeHtml(message) + "</span>");
        } finally {
          els.testBtn.disabled = false;
          els.testBtn.textContent = originalLabel;
        }
      }

      function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      async function saveConfig(event) {
        event.preventDefault();
        els.saveBtn.disabled = true;
        try {
          await invoke("save_config", { config: buildConfig() });
          window.location.href = "/";
        } catch (err) {
          alert("Failed to save configuration: " + (err?.message || err));
          els.saveBtn.disabled = false;
        }
      }

      async function init() {
        applyTheme("system");

        try {
          const config = await invoke("get_config");
          if (config && config.server_url) {
            hasExistingConfig = true;
            populateForm(config);
            els.cancelBtn.hidden = false;
          } else {
            populateForm({
              server_url: "",
              auth_mode: "dev",
              theme: "system",
              modules: { ros: true, sources: true },
              dev_identity: DEFAULT_IDENTITY
            });
          }
        } catch {
          populateForm({
            server_url: "",
            auth_mode: "dev",
            theme: "system",
            modules: { ros: true, sources: true },
            dev_identity: DEFAULT_IDENTITY
          });
        }

        syncJsonFromFields();
      }

      els.testBtn.addEventListener("click", testConnection);
      els.form.addEventListener("submit", saveConfig);
      els.cancelBtn.addEventListener("click", () => { window.location.href = "/"; });

      [els.devUsername, els.devEmail, els.devOrgId, els.devAccount].forEach((input) => {
        input.addEventListener("input", () => {
          identityFromJson = false;
          syncJsonFromFields();
        });
      });

      els.devIdentityJson.addEventListener("input", () => {
        identityFromJson = true;
      });

      els.themeSelect.addEventListener("change", () => {
        applyTheme(els.themeSelect.value);
      });

      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
        if (els.themeSelect.value === "system") {
          applyTheme("system");
        }
      });

      document.querySelectorAll('input[name="auth_mode"]').forEach((radio) => {
        radio.addEventListener("change", updateAuthPanels);
      });

      init();
    })();
  </script>
</body>
</html>
