name: Build & Release

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ui:
    name: Build UI assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone koku-ui
        run: |
          git clone --depth 1 https://github.com/project-koku/koku-ui.git /tmp/koku-ui
          cd /tmp/koku-ui
          git submodule update --init --depth 1

      - name: Build koku-ui on-prem
        run: |
          cd /tmp/koku-ui
          npm ci
          npm run build:onprem

      - name: Copy dist into ui/
        run: |
          mkdir -p ui/costManagement ui/costManagementRos ui/sources ui/rbac
          cp -r /tmp/koku-ui/apps/koku-ui-onprem/dist/. ui/
          cp -r /tmp/koku-ui/apps/koku-ui-hccm/dist/. ui/costManagement/
          cp -r /tmp/koku-ui/apps/koku-ui-ros/dist/. ui/costManagementRos/
          cp -r /tmp/koku-ui/apps/koku-ui-sources/dist/. ui/sources/
          if [ -d /tmp/koku-ui/apps/rbac-ui-onprem/dist ]; then
            cp -r /tmp/koku-ui/apps/rbac-ui-onprem/dist/. ui/rbac/
          fi

      - name: Capture koku-ui build info
        run: |
          cd /tmp/koku-ui
          UI_DATE=$(git log -1 --format='%cd' --date=format:'%Y%m%d')
          UI_HASH=$(git rev-parse HEAD | head -c 10)
          UI_REF=$(git describe --tags --always 2>/dev/null || echo "$UI_HASH")
          echo "$UI_DATE $UI_HASH $UI_REF" > ${{ github.workspace }}/ui/.build-info
          echo "koku-ui: $UI_DATE $UI_HASH ($UI_REF)"

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-assets
          path: ui/
          retention-days: 1

  build:
    name: Build (${{ matrix.name }})
    needs: build-ui
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
          - name: macOS ARM64
            os: macos-14
            rust-target: aarch64-apple-darwin
          - name: Windows x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Download UI assets
        uses: actions/download-artifact@v4
        with:
          name: ui-assets
          path: ui/

      - name: Verify UI assets
        shell: bash
        run: |
          echo "=== ui/.build-info ==="
          cat ui/.build-info || echo "(not found)"
          echo "=== ui/ contents ==="
          ls ui/
          echo "=== ui/costManagement/ ==="
          ls ui/costManagement/ 2>/dev/null || echo "(not found)"

      - name: Stamp version
        shell: bash
        run: bash scripts/stamp-version.sh

      - name: Build Tauri app
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            UI_PATH=$(cygpath -m "$(pwd)/ui")
            npx tauri build --target ${{ matrix.rust-target }} --config "{\"build\":{\"frontendDist\":\"$UI_PATH\"}}"
          else
            npx tauri build --target ${{ matrix.rust-target }}
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*
            src-tauri/target/${{ matrix.rust-target }}/release/koku-desktop
            src-tauri/target/${{ matrix.rust-target }}/release/koku-desktop.exe
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
