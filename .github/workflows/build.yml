name: Build & Release

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ui:
    name: Build UI assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone koku-ui
        run: |
          git clone --depth 1 --branch pgarciaq-koku-desktop https://github.com/pgarciaq/koku-ui.git /tmp/koku-ui
          cd /tmp/koku-ui
          git submodule update --init --depth 1

      - name: Build koku-ui on-prem
        run: |
          cd /tmp/koku-ui
          npm ci
          npm run build:onprem

      - name: Copy dist into ui/
        run: |
          mkdir -p ui/costManagement ui/costManagementRos ui/sources ui/rbac
          cp -r /tmp/koku-ui/apps/koku-ui-onprem/dist/. ui/
          cp -r /tmp/koku-ui/apps/koku-ui-hccm/dist/. ui/costManagement/
          cp -r /tmp/koku-ui/apps/koku-ui-ros/dist/. ui/costManagementRos/
          cp -r /tmp/koku-ui/apps/koku-ui-sources/dist/. ui/sources/
          if [ -d /tmp/koku-ui/apps/rbac-ui-onprem/dist ]; then
            cp -r /tmp/koku-ui/apps/rbac-ui-onprem/dist/. ui/rbac/
          fi

      - name: Capture koku-ui build info
        run: |
          cd /tmp/koku-ui
          UI_DATE=$(git log -1 --format='%cd' --date=format:'%Y%m%d')
          UI_HASH=$(git rev-parse HEAD | head -c 10)
          UI_REF=$(git describe --tags --always 2>/dev/null || echo "$UI_HASH")
          echo "$UI_DATE $UI_HASH $UI_REF" > ${{ github.workspace }}/ui/.build-info
          echo "koku-ui: $UI_DATE $UI_HASH ($UI_REF)"

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-assets
          path: ui/
          retention-days: 1

  build:
    name: Build (${{ matrix.name }})
    needs: build-ui
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: deb,rpm
          - name: macOS ARM64
            os: macos-14
            rust-target: aarch64-apple-darwin
            bundles: dmg
          - name: Windows x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Download UI assets
        uses: actions/download-artifact@v4
        with:
          name: ui-assets
          path: ui/

      - name: Verify UI assets
        shell: bash
        run: |
          echo "=== ui/.build-info ==="
          cat ui/.build-info || echo "(not found)"
          echo "=== ui/ contents ==="
          ls ui/
          echo "=== ui/costManagement/ ==="
          ls ui/costManagement/ 2>/dev/null || echo "(not found)"

      - name: Fix Windows-incompatible filenames
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Webpack Module Federation creates directories named "exposed-."
          # (from exposed: { './RootApp': ... }). NTFS silently strips trailing
          # dots, so Tauri's build can't find them. Rename to "exposed-_dot".
          find ui -name "exposed-." -type d 2>/dev/null | while read d; do
            mv "$d" "${d%?}_dot"
            echo "Renamed: $d -> ${d%?}_dot"
          done
          # Also check for already-stripped names (NTFS may have done it)
          find ui -name "exposed-" -type d 2>/dev/null | while read d; do
            mv "$d" "${d}_dot"
            echo "Renamed: $d -> ${d}_dot"
          done

      - name: Stamp version
        shell: bash
        run: bash scripts/stamp-version.sh

      - name: Upload version metadata
        if: matrix.name == 'Linux x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: version-meta
          path: |
            .stamped-version
            .stamped-version-meta
          retention-days: 1

      - name: Build Tauri app
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            UI_PATH=$(cygpath -m "$(pwd)/ui")
            EXTRA_ARGS="--config {\"build\":{\"frontendDist\":\"$UI_PATH\"}}"
          fi
          npx tauri build --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }} $EXTRA_ARGS

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          BUNDLE="src-tauri/target/${{ matrix.rust-target }}/release/bundle"
          # Linux: .deb and .rpm
          cp $BUNDLE/deb/*.deb release-assets/ 2>/dev/null || true
          cp $BUNDLE/rpm/*.rpm release-assets/ 2>/dev/null || true
          # macOS: .dmg
          cp $BUNDLE/dmg/*.dmg release-assets/ 2>/dev/null || true
          # Windows: .exe (NSIS installer) and .msi
          cp $BUNDLE/nsis/*.exe release-assets/ 2>/dev/null || true
          cp $BUNDLE/msi/*.msi release-assets/ 2>/dev/null || true
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: release-assets/*
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: build-*

      - name: Download version metadata
        uses: actions/download-artifact@v4
        with:
          name: version-meta
          path: meta/

      - name: Prepare release
        id: prep
        run: |
          STAMPED_VERSION=$(cat meta/.stamped-version)
          echo "version=$STAMPED_VERSION" >> "$GITHUB_OUTPUT"

          source meta/.stamped-version-meta
          cat > release-body.md <<BODYEOF
          ## Components

          | Component | Commit |
          |-----------|--------|
          | koku-desktop | \`${DESKTOP_HASH}\` |
          | koku-ui | \`${UI_HASH}\` (${UI_DATE}) |

          ## Downloads

          | Platform | File |
          |----------|------|
          | Linux (RPM) | \`.rpm\` |
          | Linux (DEB) | \`.deb\` |
          | macOS (ARM64) | \`.dmg\` |
          | Windows (x64) | \`.exe\` |
          BODYEOF

      - name: Flatten release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.exe' -o -name '*.msi' \) \
            -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: release-body.md
          files: release-assets/*
