name: Build & Release

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ui:
    name: Build UI assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone koku-ui
        run: |
          git clone --depth 1 https://github.com/project-koku/koku-ui.git /tmp/koku-ui
          cd /tmp/koku-ui
          git submodule update --init --depth 1

      - name: Build koku-ui on-prem
        run: |
          cd /tmp/koku-ui
          npm ci
          npm run build:onprem

      - name: Copy dist into ui/
        run: |
          mkdir -p ui/costManagement ui/costManagementRos ui/sources ui/rbac
          cp -r /tmp/koku-ui/apps/koku-ui-onprem/dist/. ui/
          cp -r /tmp/koku-ui/apps/koku-ui-hccm/dist/. ui/costManagement/
          cp -r /tmp/koku-ui/apps/koku-ui-ros/dist/. ui/costManagementRos/
          cp -r /tmp/koku-ui/apps/koku-ui-sources/dist/. ui/sources/
          if [ -d /tmp/koku-ui/apps/rbac-ui-onprem/dist ]; then
            cp -r /tmp/koku-ui/apps/rbac-ui-onprem/dist/. ui/rbac/
          fi

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-assets
          path: ui/
          retention-days: 1

  build:
    name: Build (${{ matrix.name }})
    needs: build-ui
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-22.04
            targets: "deb rpm"
            rust-target: x86_64-unknown-linux-gnu
          - name: macOS x86_64
            os: macos-13
            rust-target: x86_64-apple-darwin
          - name: macOS ARM64
            os: macos-14
            rust-target: aarch64-apple-darwin
          - name: Windows x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Download UI assets
        uses: actions/download-artifact@v4
        with:
          name: ui-assets
          path: ui/

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          args: >-
            --target ${{ matrix.rust-target }}
            ${{ matrix.targets && format('--bundles {0}', matrix.targets) || '' }}
          tagName: v__VERSION__
          releaseName: "Cost Management Desktop v__VERSION__"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false

      - name: Upload build artifacts
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*
          if-no-files-found: warn
          retention-days: 7
